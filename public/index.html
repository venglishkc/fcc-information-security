<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Secure Real Time Multiplayer Game</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, Arial, sans-serif; background: #0d1b2a; color: #e0e1dd; }
    .container { max-width: 700px; margin: 20px auto; text-align: center; }
    h1 { margin-bottom: 6px; }
    #controls { color: #a9bcd0; margin-top: 0; }
    #game-window { background: #1b263b; border: 3px solid #415a77; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Collectible Race</h1>
    <p id="controls">Move with WASD or the arrow keys. Grab the coin to score.</p>
    <canvas id="game-window" width="640" height="480"></canvas>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module">
    import Player from '/public/Player.mjs';
    import Collectible from '/public/Collectible.mjs';
    const socket = window.io ? window.io() : { on() {}, emit() {} };
    const canvas = document.getElementById('game-window');
    const context = canvas ? canvas.getContext('2d') : null;
    const SPEED = 5;
    let players = [], collectibles = [], currentPlayer = null;
    socket.on('init', ({ id, players: sp, collectibles: sc }) => {
      players = sp.map((d) => new Player(d));
      collectibles = sc.map((d) => new Collectible(d));
      currentPlayer = players.find((p) => p.id === id) || null;
    });
    socket.on('update', ({ players: sp, collectibles: sc }) => {
      players = sp.map((d) => new Player(d));
      collectibles = sc.map((d) => new Collectible(d));
      if (currentPlayer) currentPlayer = players.find((p) => p.id === currentPlayer.id) || currentPlayer;
    });
    const keyMap = { w: 'up', ArrowUp: 'up', s: 'down', ArrowDown: 'down', a: 'left', ArrowLeft: 'left', d: 'right', ArrowRight: 'right' };
    document.addEventListener('keydown', (e) => {
      const dir = keyMap[e.key];
      if (dir && currentPlayer) { currentPlayer.movePlayer(dir, SPEED); socket.emit('move', { dir, speed: SPEED }); }
    });
    function draw() {
      if (!context) return;
      context.clearRect(0, 0, canvas.width, canvas.height);
      context.fillStyle = '#ffd166';
      collectibles.forEach((item) => { context.beginPath(); context.arc(item.x + 7, item.y + 7, 7, 0, Math.PI * 2); context.fill(); });
      players.forEach((p) => { context.fillStyle = currentPlayer && p.id === currentPlayer.id ? '#06d6a0' : '#ef476f'; context.fillRect(p.x, p.y, p.width || 30, p.height || 30); });
      if (currentPlayer) { context.fillStyle = '#e0e1dd'; context.font = '16px Arial'; context.fillText(currentPlayer.calculateRank(players), 20, 24); }
      requestAnimationFrame(draw);
    }
    if (canvas) requestAnimationFrame(draw);
  </script>
</body>
</html>
